<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NutriNest</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-container { max-width: 400px; margin: 50px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        .login-btn { background: #38BDF8; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; }
        .admin-link { display: block; margin-top: 15px; color: #10b981; text-decoration: none; }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <a href="index.html" style="text-decoration: none;"><h1>NutriNest 🌿</h1></a>
        <div class="nav-links">
            <a href="products.html" style="margin-right: 15px; text-decoration: none; color: white;">Products</a>
            <a href="cart.html"><button>Cart 🛒</button></a>
        </div>
    </nav>

    <!-- Login Section -->
    <div class="login-container">
        <h2>Welcome Back!</h2>
        <br>
        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Email / Username</label>
                <input type="text" id="username" required placeholder="Enter username (try 'admin')">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="Enter password (try 'admin')">
            </div>
            <button type="submit" class="login-btn">Login</button>
        </form>
    </div>

    <script>
        function handleLogin(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            if (user === 'admin' && pass === 'admin') {
                alert("Login successful! Redirecting to Admin Dashboard.");
                window.location.href = "./admin/dashboard.html";
            } else {
                alert("Mock Login: Use admin/admin to enter dashboard. For users, consider them always logged in for now.");
                window.location.href = "./index.html";
            }
        }
    </script>
</body>
</html>
