<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - NutriNest</title>
    <link rel="stylesheet" href="admin.css">
    <script src="admin.js" defer></script>
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>NutriNest Admin</h2>
        <a href="admin/dashboard.html" class="active">Dashboard</a>
        <a href="admin/products.html">Products</a>
        <a href="admin/orders.html">Orders</a>
        <a href="admin/users.html">Users</a>
        <a href="index.html" style="margin-top: auto; border-top: 1px solid #334155;">Logout</a>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="header">
            <h2>Dashboard Overview</h2>
            <div>Admin User</div>
        </div>

        <div class="dashboard-cards">
            <div class="card">
                <h3>Total Orders</h3>
                <div class="value" id="stat-orders">0</div>
            </div>
            <div class="card">
                <h3>Total Revenue</h3>
                <div class="value" id="stat-revenue">₹0</div>
            </div>
            <div class="card">
                <h3>Products</h3>
                <div class="value">8</div>
            </div>
        </div>

        <h3>Recent Orders</h3>
        <table class="orders-table">
            <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Customer</th>
                    <th>Date</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="orders-tbody">
                <!-- Orders will be populated here -->
            </tbody>
        </table>
    </div>

</body>
</html>
